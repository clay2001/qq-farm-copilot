name: Build And Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string
      ref:
        description: 'Git ref/branch/commit to build from (optional, default current ref)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $target = '${{ github.sha }}'
          } else {
            $tag = '${{ inputs.tag }}'.Trim()
            if (-not $tag) {
              throw 'workflow_dispatch must provide a non-empty "tag" input.'
            }
            $target = '${{ inputs.ref }}'.Trim()
            if (-not $target) {
              $target = '${{ github.sha }}'
            }
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "target=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release tag: $tag"
          Write-Host "Target ref: $target"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean build.spec

      - name: Prepare package asset
        id: package
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $src = 'dist/QQFarmCopilot.exe'
          $asset = "QQFarmCopilot-$tag-windows-x64.exe"
          if (-not (Test-Path $src)) {
            throw "Build output not found: $src"
          }
          if (Test-Path $asset) {
            Remove-Item -LiteralPath $asset -Force
          }
          Copy-Item -LiteralPath $src -Destination $asset
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Package: $asset"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQFarmCopilot-${{ steps.meta.outputs.tag }}-windows-x64
          path: ${{ steps.package.outputs.asset }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $target = '${{ steps.meta.outputs.target }}'
          $asset = '${{ steps.package.outputs.asset }}'

          if (gh release view $tag *> $null) {
            Write-Host "Release already exists, upload asset with overwrite..."
            gh release upload $tag $asset --clobber
            gh release edit $tag --title $tag --latest
          } else {
            Write-Host "Create new release..."
            gh release create $tag $asset --target $target --title $tag --generate-notes --latest
          }
